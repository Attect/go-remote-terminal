<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Terminal</title>
    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <!-- App CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Token输入弹窗 -->
    <div id="token-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>Web Terminal</h2>
            <p>请输入访问令牌以连接终端服务</p>
            <input type="password" id="token-input" placeholder="输入Token..." autocomplete="off" autofocus onkeydown="if(event.key==='Enter')document.getElementById('token-submit').click()">
            <button id="token-submit" class="btn-primary" type="button" onclick="App._submitToken()">连接</button>
            <div id="token-error" class="error-text" style="display:none;"></div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="app" class="app-container" style="display:none;">
        <!-- 顶部工具栏 -->
        <header id="toolbar" class="toolbar">
            <button id="btn-sidebar-toggle" class="toolbar-btn" title="切换侧边栏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span id="toolbar-title" class="toolbar-title">Web Terminal</span>
            <div class="toolbar-right">
                <button id="btn-focus" class="toolbar-btn" title="申请焦点" style="display:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
                <!-- 字体大小调整 -->
                <button id="btn-font-dec" class="toolbar-btn mobile-only" title="减小字体">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 14h-6"/><path d="M3 5h10l-5 14"/></svg>
                </button>
                <button id="btn-font-inc" class="toolbar-btn mobile-only" title="增大字体">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h10l-5 14"/><path d="M18 10v8"/><path d="M14 14h8"/></svg>
                </button>
                <button id="btn-quick-cmd" class="toolbar-btn" title="快捷命令">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                </button>
                <button id="btn-export" class="toolbar-btn" title="导出终端输出">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button id="btn-func-keys" class="toolbar-btn" title="功能键">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="14" x2="6" y2="14"/><line x1="10" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="14" y2="14"/><line x1="18" y1="14" x2="18" y2="14"/></svg>
                </button>
                <button id="btn-mouse-mode" class="toolbar-btn" title="鼠标模式">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-6 4 2 7-6-4-6 4 2-7-6-4h7z"/></svg>
                </button>
                <button id="btn-keyboard-toggle" class="toolbar-btn mobile-only" title="虚拟键盘">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg>
                </button>
            </div>
        </header>

        <!-- 内容区 -->
        <div class="content-area">
            <!-- 侧边栏 -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h3>会话列表</h3>
                    <button id="btn-new-session" class="btn-icon" title="新建会话">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <ul id="session-list" class="session-list"></ul>
            </aside>

            <!-- 侧边栏遮罩（移动端） -->
            <div id="sidebar-overlay" class="sidebar-overlay"></div>

            <!-- 终端区域 -->
            <main id="terminal-container" class="terminal-container">
                <!-- 共享信息横幅 -->
                <div id="sharing-banner" class="sharing-banner" style="display:none;">
                    <div class="sharing-info">
                        <span class="sharing-dot"></span>
                        <span id="sharing-text">1 人正在共享</span>
                        <span id="sharing-names" class="sharing-names"></span>
                    </div>
                </div>
                <!-- 焦点提示 -->
                <div id="focus-hint" class="focus-hint" style="display:none;">
                    <span>🔒 观察模式 — 你暂无输入焦点</span>
                    <button id="btn-take-focus" class="btn-small">申请控制</button>
                </div>
                <div id="terminal-wrapper" class="terminal-wrapper">
                    <div id="xterm-terminal"></div>
                </div>
                <!-- 连接状态提示 -->
                <div id="connection-status" class="connection-status" style="display:none;">
                    <span class="status-dot"></span>
                    <span class="status-text">已断开</span>
                    <button id="btn-reconnect" class="btn-small">重连</button>
                </div>
            </main>
        </div>

        <!-- 功能键面板（移动端顶部展开） -->
        <div id="func-keys-panel" class="func-keys-panel" style="display:none;">
            <div class="fk-row">
                <button class="fk-key fk-modifier" data-key="Ctrl">Ctrl</button>
                <button class="fk-key fk-modifier" data-key="Shift">Shift</button>
                <button class="fk-key fk-modifier" data-key="Alt">Alt</button>
                <button class="fk-key" data-key="Esc">Esc</button>
                <button class="fk-key" data-key="Tab">Tab</button>
                <button class="fk-key" data-key="ResetMouse" title="切换鼠标跟踪">🖱️</button>
            </div>
            <div class="fk-row">
                <button class="fk-key" data-key="Home">Home</button>
                <button class="fk-key" data-key="ArrowUp">&uarr;</button>
                <button class="fk-key" data-key="PageUp">PgUp</button>
                <button class="fk-key" data-key="ArrowLeft">&larr;</button>
                <button class="fk-key" data-key="ArrowRight">&rarr;</button>
                <button class="fk-key" data-key="End">End</button>
                <button class="fk-key" data-key="ArrowDown">&darr;</button>
                <button class="fk-key" data-key="PageDown">PgDn</button>
            </div>
        </div>

        <!-- 虚拟键盘（移动端） -->
        <div id="virtual-keyboard" class="virtual-keyboard" style="display:none;">
            <div class="vk-row">
                <button class="vk-key vk-modifier" data-key="Esc">Esc</button>
                <button class="vk-key vk-modifier" data-key="Tab">Tab</button>
                <button class="vk-key vk-modifier" data-key="Ctrl">Ctrl</button>
                <button class="vk-key vk-modifier" data-key="Alt">Alt</button>
                <button class="vk-key vk-modifier" data-key="Shift">Shift</button>
            </div>
            <div class="vk-row">
                <button class="vk-key" data-key="ArrowUp">&uarr;</button>
                <button class="vk-key" data-key="ArrowDown">&darr;</button>
                <button class="vk-key" data-key="ArrowLeft">&larr;</button>
                <button class="vk-key" data-key="ArrowRight">&rarr;</button>
                <button class="vk-key" data-key="Paste">粘贴</button>
            </div>
        </div>
    </div>

    <!-- 重命名弹窗 -->
    <div id="rename-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>重命名会话</h3>
            <input type="text" id="rename-input" placeholder="输入新名称..." maxlength="50">
            <div class="modal-actions">
                <button id="rename-cancel" class="btn-secondary">取消</button>
                <button id="rename-confirm" class="btn-primary">确定</button>
            </div>
        </div>
    </div>

    <!-- 确认关闭弹窗 -->
    <div id="confirm-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>确认关闭</h3>
            <p id="confirm-message">确定要关闭此会话吗？关闭后进程将被终止。</p>
            <div class="modal-actions">
                <button id="confirm-cancel" class="btn-secondary">取消</button>
                <button id="confirm-ok" class="btn-danger">关闭</button>
            </div>
        </div>
    </div>

    <!-- 快捷命令抽屉 -->
    <div id="quick-cmd-panel" class="quick-cmd-panel" style="display:none;">
        <div class="quick-cmd-header">
            <span>快捷命令</span>
            <button id="btn-quick-cmd-close" class="btn-icon">&times;</button>
        </div>
        <div id="quick-cmd-list" class="quick-cmd-list"></div>
        <div class="quick-cmd-add">
            <input type="text" id="quick-cmd-input" placeholder="输入命令..." maxlength="100">
            <button id="btn-quick-cmd-add" class="btn-primary btn-small">添加</button>
        </div>
    </div>

    <!-- xterm.js -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <!-- xterm-addon-fit -->
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <!-- xterm-addon-search -->
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    <!-- App modules -->
    <script src="static/js/export.js"></script>
    <script src="static/js/terminal.js"></script>
    <script src="static/js/keyboard.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
